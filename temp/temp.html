<!-- Fragmento del Formulario -->
<section id="main-container">
    <form id="registro-form" action="#">
        <div class="input-group">
            <span class="label">Nombre Completo:</span>
            <input type="text" id="usr_nm" name="username">
        </div>

        <div class="input-group">
            <label>Edad:</label>
            <input type="number" id="age_val">
        </div>

        <div class="input-group">
            <label>Email:</label>
            <input type="email" id="correo_elect">
        </div>

        <!-- Botón que por alguna razón no envía -->
        <button type="button" id="btn-submit">Enviar Registro</button>
    </form>
</section>
